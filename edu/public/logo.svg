<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" width="200" height="40">
  <defs>
    <!-- Green gradient for icon -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <!-- Subtle shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#059669" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Icon: Rounded square background -->
  <rect x="0" y="4" width="32" height="32" rx="8" fill="url(#iconGrad)" filter="url(#shadow)"/>

  <!-- Icon: Arrow / send shape (paper plane / send symbol) -->
  <!-- Main arrow pointing top-right -->
  <g transform="translate(16, 20) rotate(-40)">
    <path d="M-8,0 L8,0" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M3,-5 L8,0 L3,5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <!-- Small dot accent -->
  <circle cx="10" cy="24" r="2" fill="white" opacity="0.5"/>

  <!-- Wordmark: IKE -->
  <text x="42" y="26.5" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="16" font-weight="800" fill="#0f172a" letter-spacing="-0.5">IKE</text>

  <!-- Wordmark: Ohashi -->
  <text x="76" y="26.5" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="16" font-weight="400" fill="#475569" letter-spacing="-0.3">Ohashi</text>

  <!-- Badge: OS -->
  <rect x="151" y="14" width="22" height="13" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="162" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="8.5" font-weight="700" fill="#64748b" text-anchor="middle" letter-spacing="0.3">OS</text>
</svg>
