version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Letdoit1@
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis-cache:
    image: redis:alpine
    volumes:
      - redis-cache-data:/data

  redis-queue:
    image: redis:alpine
    volumes:
      - redis-queue-data:/data

  redis-socketio:
    image: redis:alpine
    volumes:
      - redis-socketio-data:/data

  backend:
    image: frappe/erpnext:version-16
    command: bench serve
    environment:
      - DB_HOST=db
      - REDIS_CACHE=redis-cache:6379
      - REDIS_QUEUE=redis-queue:6379
      - REDIS_SOCKETIO=redis-socketio:6379
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
      - .:/home/frappe/frappe-bench/apps/edu
      - env-data:/home/frappe/frappe-bench/env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis-cache
      - redis-queue
      - redis-socketio

  scheduler:
    image: frappe/erpnext:version-16
    command: bench schedule
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
      - .:/home/frappe/frappe-bench/apps/edu
      - env-data:/home/frappe/frappe-bench/env
    depends_on:
      - backend

  worker-default:
    image: frappe/erpnext:version-16
    command: bench worker --queue default
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
      - .:/home/frappe/frappe-bench/apps/edu
      - env-data:/home/frappe/frappe-bench/env
    depends_on:
      - backend

volumes:
  db-data:
  redis-cache-data:
  redis-queue-data:
  redis-socketio-data:
  sites-data:
  env-data:
